name: Build Windows EXE  # 工作流名称

on:
  push:
    branches: [ main, master ]  # 当你向 main 或 master 分支推送代码时触发
  workflow_dispatch:  # 允许你在网页上手动点击按钮触发打包

jobs:
  build:
    runs-on: windows-latest  # 指定在最新版的 Windows 虚拟机上运行

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # 这里可以指定你想要的Python版本，如 3.9, 3.11 等

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        # 如果你的项目有 requirements.txt，取消下面这行的注释：
        # pip install -r requirements.txt
        # 根据你的脚本，直接安装需要的库：
        pip install pyinstaller pandas openpyxl python-docx

    - name: 执行 PyInstaller 打包
      run: |
        # 这里的 main.py 请替换成你实际的 Python 脚本文件名
        # 第一次测试建议先不加 -w，方便看报错；确认无误后再加上 -w
        pyinstaller -F FileTransformer.py 

    - name: 上传生成的 exe 文件
      uses: actions/upload-artifact@v4
      with:
        name: FileTransformer  # 打包产物的名字
        path: dist/  # 告诉 GitHub 保存 dist 文件夹里的所有内容
